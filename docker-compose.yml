services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env
    volumes:
      - sun-stats-data:/app/data
    expose:
      - "3001"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      - BACKEND_URL=http://backend:3001
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  sun-stats-data:

