[[services]]
name = "backend"

[services.build]
dockerfilePath = "apps/backend/Dockerfile"

[services.deploy]
sleepApplication = true
startCommand = "node apps/backend/dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30

[[services]]
name = "frontend"

[services.build]
dockerfilePath = "apps/frontend/Dockerfile"

[services.deploy]
sleepApplication = true
startCommand = "/bin/sh -c \"envsubst '${BACKEND_URL}' < /etc/nginx/conf.d/default.conf.template > /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'\""
healthcheckPath = "/"
healthcheckTimeout = 10
